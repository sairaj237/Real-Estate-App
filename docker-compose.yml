version: '3.8'

services:
  backend:
    build: ./backend
    container_name: real-estate-backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - PINECONE_ENVIRONMENT=${PINECONE_ENVIRONMENT}
      - PINECONE_INDEX=${PINECONE_INDEX}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./backend/.env:/app/.env:ro
    restart: unless-stopped
    networks:
      - app-network

  frontend:
    build: ./frontend
    container_name: real-estate-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app-network

  # Optional: MongoDB if not using external service
  # mongodb:
  #   image: mongo:6
  #   container_name: real-estate-mongo
  #   ports:
  #     - "27017:27017"
  #   volumes:
  #     - mongo-data:/data/db
  #   restart: unless-stopped
  #   networks:
  #     - app-network

networks:
  app-network:
    driver: bridge

