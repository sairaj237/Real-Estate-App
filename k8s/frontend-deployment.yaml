apiVersion: apps/v1
kind: Deployment
metadata:
  name: real-estate-frontend
  namespace: real-estate-app
  labels:
    app: real-estate-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: real-estate-frontend
  template:
    metadata:
      labels:
        app: real-estate-frontend
    spec:
      containers:
        - name: frontend
          image: 016817716305.dkr.ecr.us-east-1.amazonaws.com/realestate-frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5