apiVersion: apps/v1
kind: Deployment
metadata:
  name: real-estate-backend
  namespace: real-estate-app
  labels:
    app: real-estate-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: real-estate-backend
  template:
    metadata:
      labels:
        app: real-estate-backend
    spec:
      containers:
      - name: backend
        image: [DOCKERHUB_USERNAME]/real-estate-backend:latest
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: real-estate-config
              key: NODE_ENV
        - name: PINECONE_ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: real-estate-config
              key: PINECONE_ENVIRONMENT
        - name: PINECONE_INDEX
          valueFrom:
            configMapKeyRef:
              name: real-estate-config
              key: PINECONE_INDEX
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: real-estate-secrets
              key: MONGO_URI
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: real-estate-secrets
              key: JWT_SECRET
        - name: PINECONE_API_KEY
          valueFrom:
            secretKeyRef:
              name: real-estate-secrets
              key: PINECONE_API_KEY
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: real-estate-secrets
              key: OPENAI_API_KEY
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/user/check-auth
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/user/check-auth
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5