apiVersion: v1
kind: Secret
metadata:
  name: real-estate-secrets
  namespace: real-estate-app
type: Opaque
data:
  # Base64 encoded values - replace with your actual encoded secrets
  # echo -n "your-secret" | base64
  MONGO_URI: ""  # Add your base64 encoded MongoDB URI
  JWT_SECRET: ""  # Add your base64 encoded JWT secret
  PINECONE_API_KEY: ""  # Add your base64 encoded Pinecone API key
  OPENAI_API_KEY: ""  # Add your base64 encoded OpenAI API key